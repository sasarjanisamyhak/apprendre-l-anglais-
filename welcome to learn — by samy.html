/* ── Parse vocab ── */
const VOCAB = [];
RAW.split('\n').forEach(line => {
  line = line.trim();
  if (!line || line.startsWith('👨') || line.startsWith('🐾') ||
      line.startsWith('👋') || line.startsWith('❓') || line.startsWith('👤') ||
      line.startsWith('🛒') || line.startsWith('📐') || line.startsWith('🍎') ||
      line.startsWith('🔢') || line.startsWith('⏱') || line.startsWith('🗣') ||
      line.startsWith('📍') || line.startsWith('🏫') || line.startsWith('📚') ||
      line.startsWith('🧹') || line.startsWith('🏙') || line.startsWith('🌿') ||
      line.startsWith('🛏') || line.startsWith('📇') || line.startsWith('🧠') ||
      line.startsWith('🛍') || line.startsWith('🏪') || line.startsWith('✈') ||
      line.startsWith('🧳') || line.startsWith('🚍') || line.startsWith('🌍') ||
      line.startsWith('⸻') || line.startsWith('—') || line.startsWith('#')) return;

  const idx = line.indexOf(' : ');
  if (idx === -1) return;
  const fr = line.substring(0, idx).trim();
  const en = line.substring(idx + 3).trim();
  if (fr && en) VOCAB.push({ fr, en });
});

/* ── Accepted answers from EN string ── */
function getAccepted(enStr) {
  // Split by / and take all variants
  return enStr.split('/').map(s =>
    s.trim().toLowerCase()
      .replace(/^(the|a|an)\s+/,'')
      .replace(/[!?.,]/g,'')
      .trim()
  );
}

function normalize(s) {
  return s.toLowerCase().replace(/[!?.,]/g,'').replace(/^(the|a|an)\s+/,'').trim();
}

function isCorrect(userAns, enStr) {
  const user = normalize(userAns);
  if (!user) return false;
  const accepted = getAccepted(enStr);
  // exact match
  if (accepted.some(a => a === user)) return true;
  // fuzzy: allow 1 char difference for words > 4 chars
  return accepted.some(a => {
    if (a.length > 4 && Math.abs(a.length - user.length) <= 1) {
      return levenshtein(a, user) <= 1;
    }
    return a === user;
  });
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1}, (_,i) => Array.from({length:n+1}, (_,j) => i===0?j:j===0?i:0));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

/* ═══════════════════════════════════════
   SESSION STATE
═══════════════════════════════════════ */
let sessionDur = 5;    // minutes (0 = infinite)
let wordTime   = 45;   // seconds per word
let direction  = 'fr-en';
let mode       = 'etudier';

// word mastery: id -> { errorCount, correctCount, nextAppear }
let mastery = {};
try { mastery = JSON.parse(localStorage.getItem('vocab_mastery') || '{}'); } catch(e){}

let queue = [];           // current session queue (indices into VOCAB)
let qPos  = 0;            // position in queue
let wordErrors = {};      // this word's error count in session: id->count
let sessionCorrect = 0;
let sessionWrong   = 0;
let sessionSeen    = new Set();
let sessionMissed  = {};  // id -> {fr,en}
let streak = 0;
let bestStreak = 0;
let score = 0;

let sessionTimer = null;
let wordTimerInt = null;
let sessionSecondsLeft = 300;
let wordSecondsLeft = 45;
let paused = false;
let answering = false;    // waiting for next word after reveal

/* ─── Settings selectors ─── */
function selectDur(btn, val) {
  document.querySelectorAll('#dur-select .pill').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  sessionDur = val;
}
function selectSpd(btn, val) {
  document.querySelectorAll('#spd-select .pill').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  wordTime = val;
}
function selectDir(btn, val) {
  document.querySelectorAll('#dir-select .pill').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  direction = val;
}

/* ─── Page nav ─── */
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'mode-select') {
    const missed = Object.keys(mastery).filter(k => (mastery[k]?.errorCount||0) > 0);
    document.getElementById('missed-count-info').textContent =
      missed.length > 0 ? `📌 ${missed.length} mots ratés mémorisés` : '';
  }
}

/* ─── Build queue ─── */
function buildQueue(onlyMissed = false, duration = sessionDur) {
  let pool = VOCAB.map((_,i) => i);

  if (onlyMissed) {
    pool = pool.filter(i => (mastery[i]?.errorCount||0) > 0);
    if (pool.length === 0) pool = VOCAB.map((_,i) => i);
  }

  // Weighted shuffle: mastered words less likely, error words more likely
  const weighted = [];
  pool.forEach(i => {
    const m = mastery[i] || {};
    const w = Math.max(1, 4 - (m.correctStreak||0) + (m.errorCount||0)*2);
    for (let x=0;x<w;x++) weighted.push(i);
  });

  // Fisher-Yates shuffle
  for (let i=weighted.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [weighted[i],weighted[j]]=[weighted[j],weighted[i]];
  }

  // Limit to ~estimated words possible in duration
  const seconds = duration > 0 ? duration*60 : 99999;
  const maxWords = Math.min(weighted.length, Math.ceil(seconds / (wordTime+2)));

  // Deduplicate while preserving order
  const seen = new Set(), out = [];
  for (const i of weighted) {
    if (!seen.has(i)) { seen.add(i); out.push(i); }
    if (out.length >= maxWords) break;
  }
  return out;
}

/* ─── Start session ─── */
function startSession(m, onlyMissed = false) {
  mode = m;
  const dur = onlyMissed ? 2 : sessionDur;

  // Reset session state
  queue = buildQueue(onlyMissed, dur);
  qPos  = 0;
  wordErrors = {};
  sessionCorrect = 0;
  sessionWrong   = 0;
  sessionSeen    = new Set();
  sessionMissed  = {};
  streak = 0;
  bestStreak = 0;
  score  = 0;
  paused = false;
  answering = false;

  sessionSecondsLeft = dur > 0 ? dur*60 : 999999;

  document.getElementById('quiz-mode-badge').textContent = m === 'intero' ? 'intero' : 'étudier';
  showPage('quiz');
  updateScore();

  clearInterval(sessionTimer);
  if (dur > 0) {
    sessionTimer = setInterval(() => {
      if (!paused) {
        sessionSecondsLeft--;
        updateSessionTimer();
        if (sessionSecondsLeft <= 0) endSession();
      }
    }, 1000);
  } else {
    document.getElementById('session-timer').textContent = '∞';
  }

  nextWord();
}

/* ─── Next word ─── */
function nextWord() {
  answering = false;
  clearInterval(wordTimerInt);

  if (qPos >= queue.length) {
    endSession();
    return;
  }

  const idx = queue[qPos];
  const word = VOCAB[idx];
  sessionSeen.add(idx);

  const ansInput = document.getElementById('ans-input');
  const revealDiv = document.getElementById('correct-reveal');
  const validateBtn = document.getElementById('validate-btn');

  ansInput.value = '';
  ansInput.className = 'answer-input';
  revealDiv.style.display = 'none';
  validateBtn.textContent = 'validé ✓';
  validateBtn.onclick = validateAnswer;

  const frEl = document.getElementById('fr-word');
  if (direction === 'fr-en') {
    frEl.textContent = word.fr;
    ansInput.placeholder = 'ta réponse en anglais…';
  } else {
    frEl.textContent = word.en;
    ansInput.placeholder = 'ta réponse en français…';
  }

  frEl.classList.add('pop-anim');
  setTimeout(() => frEl.classList.remove('pop-anim'), 300);

  // Counter
  document.getElementById('counter-pill').textContent =
    mode === 'intero'
      ? `${sessionSeen.size}/${VOCAB.length}`
      : `${qPos+1}/${queue.length}`;

  // Word timer
  wordSecondsLeft = wordTime;
  updateWordBar();
  wordTimerInt = setInterval(() => {
    if (!paused) {
      wordSecondsLeft--;
      updateWordBar();
      if (wordSecondsLeft <= 0) {
        clearInterval(wordTimerInt);
        autoFail();
      }
    }
  }, 1000);

  ansInput.focus();
}

/* ─── Word timer bar ─── */
function updateWordBar() {
  const pct = (wordSecondsLeft / wordTime) * 100;
  document.getElementById('word-bar').style.width = pct + '%';
}

/* ─── Validate answer ─── */
function validateAnswer() {
  if (answering) { nextQuestion(); return; }
  clearInterval(wordTimerInt);

  const idx = queue[qPos];
  const word = VOCAB[idx];
  const userVal = document.getElementById('ans-input').value.trim();
  const correct = direction === 'fr-en'
    ? isCorrect(userVal, word.en)
    : isCorrect(userVal, word.fr);

  const ansInput  = document.getElementById('ans-input');
  const revealDiv = document.getElementById('correct-reveal');
  const validateBtn = document.getElementById('validate-btn');

  if (correct) {
    ansInput.classList.add('correct');
    revealDiv.style.display = 'none';

    sessionCorrect++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    score++;

    const m = mastery[idx] || {errorCount:0, correctStreak:0};
    m.correctStreak = (m.correctStreak||0)+1;
    if (m.correctStreak >= 3) m.errorCount = Math.max(0,(m.errorCount||0)-1);
    mastery[idx] = m;

    // Re-queue for spaced repetition (every 10 words)
    if (m.correctStreak < 3) queue.splice(qPos+10, 0, idx);

  } else {
    ansInput.classList.add('wrong');

    const correctAns = direction === 'fr-en' ? word.en : word.fr;
    document.getElementById('correct-pill').textContent = '✓ ' + correctAns;
    revealDiv.style.display = 'block';

    sessionWrong++;
    streak = 0;

    const errs = (wordErrors[idx] || 0) + 1;
    wordErrors[idx] = errs;

    const m = mastery[idx] || {errorCount:0, correctStreak:0};
    m.errorCount = (m.errorCount||0)+1;
    m.correctStreak = 0;
    mastery[idx] = m;

    sessionMissed[idx] = {fr:word.fr, en:word.en};

    // Re-insert based on error count
    const reinsert = errs === 1 ? 5 : errs === 2 ? 3 : 2;
    queue.splice(qPos+reinsert, 0, idx);

    ansInput.classList.add('shake-anim');
    setTimeout(() => ansInput.classList.remove('shake-anim'), 400);
  }

  saveMastery();
  updateScore();

  answering = true;
  validateBtn.textContent = 'suivant →';
  validateBtn.onclick = nextQuestion;

  // If mode intero: auto-advance after 1.5s
  if (mode === 'intero' && correct) {
    setTimeout(nextQuestion, 1200);
  }
}

function nextQuestion() {
  qPos++;
  nextWord();
}

/* ─── Auto fail (time out) ─── */
function autoFail() {
  const idx = queue[qPos];
  const word = VOCAB[idx];
  const ansInput = document.getElementById('ans-input');
  const revealDiv = document.getElementById('correct-reveal');
  const validateBtn = document.getElementById('validate-btn');

  ansInput.classList.add('wrong');
  const correctAns = direction === 'fr-en' ? word.en : word.fr;
  document.getElementById('correct-pill').textContent = '⏰ ' + correctAns;
  revealDiv.style.display = 'block';

  sessionWrong++;
  streak = 0;

  const errs = (wordErrors[idx]||0)+1;
  wordErrors[idx] = errs;

  const m = mastery[idx] || {errorCount:0, correctStreak:0};
  m.errorCount = (m.errorCount||0)+1;
  m.correctStreak = 0;
  mastery[idx] = m;
  sessionMissed[idx] = {fr:word.fr, en:word.en};

  const reinsert = errs===1?5:errs===2?3:2;
  queue.splice(qPos+reinsert, 0, idx);

  saveMastery();
  updateScore();

  answering = true;
  validateBtn.textContent = 'suivant →';
  validateBtn.onclick = nextQuestion;
}

/* ─── Pause/Play ─── */
function togglePause() {
  paused = !paused;
  const btn = document.getElementById('pause-btn');
  btn.textContent = paused ? 'play ▶' : 'pause';
  const frEl = document.getElementById('fr-word');
  if (paused) {
    frEl.textContent = '⏸ pause';
  } else {
    const idx = queue[qPos] !== undefined ? queue[qPos] : null;
    if (idx !== null) {
      frEl.textContent = direction === 'fr-en' ? VOCAB[idx].fr : VOCAB[idx].en;
    }
  }
}

/* ─── Timers ─── */
function updateSessionTimer() {
  const m = Math.floor(sessionSecondsLeft/60);
  const s = sessionSecondsLeft%60;
  document.getElementById('session-timer').textContent =
    `${m}:${String(s).padStart(2,'0')}`;
}

function updateScore() {
  document.getElementById('streak-display').textContent = `🔥 ${streak}`;
  document.getElementById('score-display').textContent  = `${score} pts`;
}

/* ─── End session ─── */
function endSession() {
  clearInterval(sessionTimer);
  clearInterval(wordTimerInt);

  const total = sessionCorrect + sessionWrong;
  const note20 = total > 0 ? Math.round((sessionCorrect/total)*20) : 0;

  document.getElementById('res-mode-badge').textContent = mode;
  document.getElementById('final-score').textContent = `${note20}/20`;
  document.getElementById('r-seen').textContent    = sessionSeen.size;
  document.getElementById('r-correct').textContent = sessionCorrect;
  document.getElementById('r-wrong').textContent   = sessionWrong;
  document.getElementById('r-streak').textContent  = bestStreak;

  const ml = document.getElementById('missed-list');
  ml.innerHTML = '';
  const missedArr = Object.values(sessionMissed);
  if (missedArr.length === 0) {
    ml.innerHTML = '<div style="color:#888;font-size:.9rem">Aucune erreur ! 🎉</div>';
  } else {
    missedArr.forEach(w => {
      const div = document.createElement('div');
      div.className = 'missed-item';
      div.innerHTML = `<span class="fr">${w.fr}</span><span class="en">${w.en}</span>`;
      ml.appendChild(div);
    });
  }

  document.getElementById('review-btn').style.display = missedArr.length>0 ? '' : 'none';
  showPage('results');
}

/* ─── Review errors ─── */
function reviewErrors() {
  mode = 'etudier';
  const dur = 2;
  sessionDur = dur;
  startSession('etudier', true);
}

/* ─── Confirm home ─── */
function confirmHome() {
  if (confirm('Quitter la session en cours ?')) {
    clearInterval(sessionTimer);
    clearInterval(wordTimerInt);
    showPage('home');
  }
}

/* ─── Persistence ─── */
function saveMastery() {
  try { localStorage.setItem('vocab_mastery', JSON.stringify(mastery)); } catch(e){}
}

/* ─── Enter key ─── */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('quiz').classList.contains('active')) {
    e.preventDefault();
    if (answering) nextQuestion();
    else validateAnswer();
  }
});

/* ─── Init ─── */
updateSessionTimer();
</script>
